<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMF</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0d1117;
    color:white;
    text-align:center;
    padding:30px;
}
.container{
    max-width:700px;
    margin:auto;
    background:#161b22;
    padding:25px;
    border-radius:16px;
    box-shadow:0 0 20px rgba(0,255,150,0.15);
}
input, button{
    padding:12px;
    width:90%;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
}
button{
    background:#00c896;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
.result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}
.small{
    font-size:14px;
    color:#9ca3af;
}
h1{
    font-size:38px;
    margin-bottom:5px;
}
</style>
</head>
<body>

<div class="container">
    <h1>TMF</h1>
    <p>The Mafia Forecast</p>

    <input id="prices" placeholder="Enter recent prices: 3320,3322,3325,3328">

    <button onclick="predict()">Analyze Market</button>

    <div class="result" id="output"></div>
    <p class="small">Trend • Momentum • RSI Engine</p>
</div>

<script>
function ema(arr, period){
    let k = 2/(period+1);
    let val = arr[0];
    for(let i=1;i<arr.length;i++){
        val = arr[i]*k + val*(1-k);
    }
    return val;
}

function rsi(prices){
    let gains=0, losses=0;
    for(let i=1;i<prices.length;i++){
        let diff = prices[i]-prices[i-1];
        if(diff>0) gains += diff;
        else losses -= diff;
    }
    if(losses===0) return 100;
    let rs = gains/losses;
    return 100 - (100/(1+rs));
}

function predict(){
    let input = document.getElementById("prices").value;
    let prices = input.split(",").map(Number).filter(x=>!isNaN(x));

    if(prices.length < 6){
        document.getElementById("output").innerHTML = "Need at least 6 price points.";
        return;
    }

    let fast = ema(prices,3);
    let slow = ema(prices,6);
    let momentum = prices[prices.length-1] - prices[prices.length-3];
    let strength = rsi(prices);

    let score = 0;

    if(fast > slow) score += 35;
    else score -= 35;

    if(momentum > 0) score += 25;
    else score -= 25;

    if(strength < 35) score += 20;
    if(strength > 65) score -= 20;

    let confidence = Math.min(Math.abs(score),95);
    let result = "";

    if(score > 20){
        result = "📈 BUY SIGNAL (" + confidence + "% confidence)";
    }else if(score < -20){
        result = "📉 SELL SIGNAL (" + confidence + "% confidence)";
    }else{
        result = "⚖️ WAIT / NO TRADE";
    }

    document.getElementById("output").innerHTML = result;
}
</script>

</body>
</html>
