<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TMF Live</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#05070d,#0f172a,#111827);
color:#fff;
}
.card{
width:100%;
max-width:430px;
padding:28px;
border-radius:28px;
background:rgba(255,255,255,.07);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 25px 60px rgba(0,0,0,.45);
}
h1{font-size:42px;text-align:center}
.sub{text-align:center;opacity:.7;margin:8px 0 22px}
input,button{
width:100%;padding:16px;border:none;border-radius:18px;
font-size:16px;margin-bottom:12px;
}
input{background:rgba(255,255,255,.06);color:#fff;outline:none}
button{
font-weight:800;cursor:pointer;
background:linear-gradient(135deg,#00ffd0,#00b8ff);
color:#03131b;
}
.result{
margin-top:8px;padding:20px;border-radius:20px;
background:rgba(255,255,255,.05);
min-height:120px;
display:flex;align-items:center;justify-content:center;
text-align:center;line-height:1.5;
}
.small{font-size:14px;opacity:.72}
</style>
</head>
<body>
<div class="card">
<h1>TMF</h1>
<div class="sub">The Mafia Forecast • Live</div>

<input id="pair" placeholder="XAU/USD, EUR/USD, BTC/USD">
<button onclick="analyzePair()">Analyze Live Market</button>

<div class="result" id="output">Awaiting pair input</div>
</div>

<script>
const API_KEY =b772ae62a8ff4d57b77f886b8619b58c ;

function ema(values, period){
let k = 2 / (period + 1);
let emaVal = values[0];
for(let i=1;i<values.length;i++){
emaVal = values[i] * k + emaVal * (1-k);
}
return emaVal;
}

function rsi(values){
let gains = 0, losses = 0;
for(let i=1;i<values.length;i++){
let diff = values[i] - values[i-1];
if(diff > 0) gains += diff;
else losses -= diff;
}
if(losses === 0) return 100;
let rs = gains / losses;
return 100 - (100/(1+rs));
}

async function analyzePair(){
const pairInput = document.getElementById("pair").value.trim().toUpperCase();
const pair = pairInput.replace("/", "");
const out = document.getElementById("output");

if(!pair){
out.innerHTML = "Enter a valid pair";
return;
}

out.innerHTML = "Scanning live market...";

try{
const url =
`https://api.twelvedata.com/time_series?symbol=${pair}&interval=5min&outputsize=30&apikey=${API_KEY}`;

const res = await fetch(url);
const data = await res.json();

if(!data.values){
out.innerHTML = "Pair not found or API limit reached.";
return;
}

const closes = data.values.reverse().map(c => parseFloat(c.close));

const fast = ema(closes, 5);
const slow = ema(closes, 12);
const strength = rsi(closes);
const momentum = closes[closes.length-1] - closes[closes.length-4];

let score = 0;

if(fast > slow) score += 35;
else score -= 35;

if(momentum > 0) score += 25;
else score -= 25;

if(strength < 35) score += 20;
if(strength > 65) score -= 20;

const confidence = Math.min(Math.abs(score) + 40, 95);

let signal = "⚖️ WAIT";
let note = "No clear edge";

if(score > 15){
signal = "📈 BUY";
note = "Bullish alignment detected";
}else if(score < -15){
signal = "📉 SELL";
note = "Bearish alignment detected";
}

out.innerHTML = `
<div>
${signal}<br>
<span class="small">${pair}</span><br>
<span class="small">${confidence}% confidence</span><br>
<span class="small">RSI: ${strength.toFixed(1)} • ${note}</span>
</div>
`;

}catch(err){
out.innerHTML = "Error loading live data.";
}
}
</script>
</body>
</html>
