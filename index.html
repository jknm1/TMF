<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TMF</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#05070d,#0f172a,#111827);
overflow:hidden;
color:#fff;
}

body::before,
body::after{
content:"";
position:fixed;
width:360px;
height:360px;
border-radius:50%;
filter:blur(110px);
opacity:.45;
z-index:0;
animation:float 10s ease-in-out infinite;
}

body::before{
background:#00ffd0;
top:-120px;
left:-120px;
}

body::after{
background:#3b82f6;
bottom:-120px;
right:-120px;
animation-delay:2s;
}

@keyframes float{
0%,100%{transform:translate(0,0);}
50%{transform:translate(40px,30px);}
}

.card{
position:relative;
z-index:2;
width:100%;
max-width:430px;
padding:28px;
border-radius:30px;
background:rgba(255,255,255,.07);
backdrop-filter:blur(22px);
-webkit-backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 25px 60px rgba(0,0,0,.45);
animation:fade .8s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(35px);}
to{opacity:1;transform:translateY(0);}
}

.logo{
font-size:42px;
font-weight:800;
letter-spacing:2px;
text-align:center;
}

.sub{
text-align:center;
opacity:.72;
font-size:14px;
margin:5px 0 24px;
}

input{
width:100%;
padding:17px;
border:none;
outline:none;
border-radius:18px;
margin-bottom:14px;
font-size:16px;
background:rgba(255,255,255,.06);
color:#fff;
transition:.25s ease;
}

input:focus{
transform:scale(1.02);
box-shadow:0 0 0 2px #00ffd0;
background:rgba(255,255,255,.1);
}

button{
width:100%;
padding:16px;
border:none;
border-radius:18px;
font-size:16px;
font-weight:800;
cursor:pointer;
background:linear-gradient(135deg,#00ffd0,#00b8ff);
color:#04131a;
transition:.25s ease;
box-shadow:0 12px 30px rgba(0,255,208,.22);
}

button:hover{
transform:translateY(-2px) scale(1.02);
}

button:active{
transform:scale(.98);
}

.result{
margin-top:18px;
padding:22px;
border-radius:22px;
background:rgba(255,255,255,.05);
min-height:110px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-size:22px;
font-weight:700;
opacity:0;
transform:translateY(10px);
transition:.4s ease;
line-height:1.45;
}

.result.show{
opacity:1;
transform:translateY(0);
}

.small{
font-size:14px;
opacity:.72;
font-weight:500;
}

.pulse{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:.45;}
}

.footer{
margin-top:15px;
text-align:center;
font-size:13px;
opacity:.55;
}
</style>
</head>

<body>

<div class="card">
<div class="logo">TMF</div>
<div class="sub">The Mafia Forecast</div>

<input id="pair" placeholder="Enter Pair (XAUUSD, EURUSD, BTCUSD)">
<button onclick="analyze()">Analyze Pair</button>

<div class="result" id="output">Awaiting Pair Input</div>

<div class="footer">Smart Pair Scanner • Trend Engine</div>
</div>

<script>
function analyze(){

const pair = document.getElementById("pair").value.trim().toUpperCase();
const output = document.getElementById("output");

output.classList.remove("show");
output.innerHTML = "<span class='pulse'>Scanning " + pair + "...</span>";

setTimeout(()=>{

if(pair === ""){
output.innerHTML = "Enter a valid pair";
output.classList.add("show");
return;
}

/*
Demo Logic:
Since GitHub Pages cannot access broker live data alone,
this version simulates intelligent forecasts by pair behavior.
Later you can connect API data.
*/

let score = 0;

if(pair.includes("XAU")) score = Math.random()*60 - 30;
else if(pair.includes("BTC")) score = Math.random()*90 - 45;
else if(pair.includes("JPY")) score = Math.random()*70 - 35;
else if(pair.includes("USD")) score = Math.random()*60 - 30;
else score = Math.random()*50 - 25;

let confidence = Math.floor(Math.min(Math.abs(score)+45,95));

let trend = "";
let bias = "";

if(score > 15){
trend = "📈 BUY";
bias = "Bullish Momentum Detected";
}
else if(score < -15){
trend = "📉 SELL";
bias = "Bearish Pressure Detected";
}
else{
trend = "⚖️ WAIT";
bias = "No Clear Direction";
}

output.innerHTML = `
${trend}<br>
<span class="small">${pair}</span><br>
<span class="small">${confidence}% confidence</span><br>
<span class="small">${bias}</span>
`;

output.classList.add("show");

},1600);
}
</script>

</body>
</html>
